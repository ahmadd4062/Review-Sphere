services:
  - type: web
    name: review-sphere
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn ahmad_arshad.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: review-sphere-db
          property: connectionString
    healthCheckPath: /admin/

databases:
  - name: review-sphere-db
    plan: free
    databaseName: review_sphere
    user: review_sphere_user